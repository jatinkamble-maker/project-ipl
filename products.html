<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL Shop | Products & Jerseys</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 25%, #0f3460 50%, #1a1a2e 75%, #16213e 100%);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at 20% 50%, rgba(120, 119, 198, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 177, 153, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 80%, rgba(250, 204, 21, 0.08) 0%, transparent 50%);
            animation: backgroundShift 25s ease-in-out infinite;
            z-index: -1;
        }

        @keyframes backgroundShift {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            33% { transform: translateY(-15px) rotate(1deg); }
            66% { transform: translateY(15px) rotate(-1deg); }
        }

        /* Floating Particles */
        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(250, 204, 21, 0.7);
            border-radius: 50%;
            pointer-events: none;
            animation: float 20s linear infinite;
            z-index: -1;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* ===== HEADER ===== */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
            background: rgba(5, 15, 40, 0.95);
            backdrop-filter: blur(10px);
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            animation: headerSlideDown 0.8s ease-out;
        }

        @keyframes headerSlideDown {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        header h2 {
            color: #facc15;
            font-size: 24px;
            animation: logoGlow 2s ease-in-out infinite alternate;
        }

        @keyframes logoGlow {
            from { text-shadow: 0 0 5px rgba(250, 204, 21, 0.5); }
            to { text-shadow: 0 0 20px rgba(250, 204, 21, 0.8); }
        }

        nav {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        nav a, nav button {
            color: #e5e7eb;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 15px;
            position: relative;
            overflow: hidden;
        }

        nav a::before, nav button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(250, 204, 21, 0.2), transparent);
            transition: left 0.5s ease;
        }

        nav a:hover::before, nav button:hover::before {
            left: 100%;
        }

        nav a:hover, nav button:hover {
            color: #facc15;
            transform: translateY(-2px);
        }

        .cart-badge {
            background: #ef4444;
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            position: absolute;
            top: -8px;
            right: -8px;
        }

        .cart-icon-wrapper {
            position: relative;
        }

        /* ===== MAIN CONTENT ===== */
        main {
            margin-top: 80px;
            padding: 40px;
            animation: fadeInUp 1s ease-out 0.3s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .page-header {
            text-align: center;
            margin-bottom: 50px;
            animation: slideInFromTop 0.8s ease-out 0.5s both;
        }

        @keyframes slideInFromTop {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .page-header h1 {
            font-size: 48px;
            color: #facc15;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(250, 204, 21, 0.3);
            animation: titleGlow 3s ease-in-out infinite alternate;
        }

        @keyframes titleGlow {
            from { text-shadow: 0 0 10px rgba(250, 204, 21, 0.3); }
            to { text-shadow: 0 0 30px rgba(250, 204, 21, 0.6); }
        }

        .page-header p {
            font-size: 16px;
            color: #cbd5f5;
            animation: textFadeIn 1s ease-out 0.7s both;
        }

        @keyframes textFadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== FILTERS ===== */
        .filters {
            display: flex;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
            justify-content: center;
            animation: filtersSlideIn 0.8s ease-out 0.8s both;
        }

        @keyframes filtersSlideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .filter-btn {
            background: rgba(255, 255, 255, 0.08);
            color: #e5e7eb;
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            font-weight: 600;
            font-size: 14px;
            position: relative;
            overflow: hidden;
        }

        .filter-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(250, 204, 21, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .filter-btn:hover::before {
            left: 100%;
        }

        .filter-btn:hover, .filter-btn.active {
            background: #facc15;
            color: #020617;
            border-color: #facc15;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(250, 204, 21, 0.3);
        }

        /* ===== PRODUCTS GRID ===== */
        .products-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            margin-bottom: 60px;
            animation: productsFadeIn 1s ease-out 1s both;
        }

        @keyframes productsFadeIn {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .product-card {
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02));
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
            animation: cardSlideIn 0.6s ease-out both;
        }

        .product-card:nth-child(1) { animation-delay: 0.1s; }
        .product-card:nth-child(2) { animation-delay: 0.2s; }
        .product-card:nth-child(3) { animation-delay: 0.3s; }
        .product-card:nth-child(4) { animation-delay: 0.4s; }
        .product-card:nth-child(5) { animation-delay: 0.5s; }
        .product-card:nth-child(6) { animation-delay: 0.6s; }
        .product-card:nth-child(7) { animation-delay: 0.7s; }
        .product-card:nth-child(8) { animation-delay: 0.8s; }

        @keyframes cardSlideIn {
            from {
                opacity: 0;
                transform: translateY(50px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .product-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(250, 204, 21, 0.1), transparent);
            transition: left 0.6s ease;
            z-index: 1;
        }

        .product-card:hover::before {
            left: 100%;
        }

        .product-card:hover {
            transform: translateY(-15px) scale(1.02);
            box-shadow: 0 25px 60px rgba(250, 204, 21, 0.2);
            border-color: rgba(250, 204, 21, 0.3);
        }

        .product-image {
            width: 100%;
            height: 250px;
            background: linear-gradient(135deg, rgba(250, 204, 21, 0.1), rgba(250, 204, 21, 0.05));
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .product-card:hover .product-image img {
            transform: scale(1.1) rotate(2deg);
        }

        .product-image::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(250, 204, 21, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: all 0.4s ease;
            z-index: 2;
        }

        .product-card:hover .product-image::before {
            width: 200px;
            height: 200px;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .product-info {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .product-team {
            color: #facc15;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .product-name {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
            color: white;
        }

        .product-description {
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 12px;
            flex-grow: 1;
        }

        .product-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 15px;
            font-size: 12px;
            color: #cbd5f5;
        }

        .product-details span {
            background: rgba(0, 0, 0, 0.3);
            padding: 6px 10px;
            border-radius: 6px;
            border-left: 2px solid #facc15;
        }

        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        .product-price {
            font-size: 24px;
            font-weight: 700;
            color: #facc15;
        }

        .btn-add-cart {
            background: linear-gradient(135deg, #facc15, #fbbf24);
            color: #020617;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-size: 13px;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            white-space: nowrap;
            position: relative;
            overflow: hidden;
            animation: buttonPulse 2s ease-in-out infinite;
        }

        .btn-add-cart::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .btn-add-cart:hover::before {
            left: 100%;
        }

        .btn-add-cart:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 10px 25px rgba(250, 204, 21, 0.4);
        }

        .btn-add-cart:active {
            transform: translateY(0) scale(0.98);
        }

        @keyframes buttonPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            animation: emptyStateFadeIn 1s ease-out both;
        }

        @keyframes emptyStateFadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .empty-state-icon {
            font-size: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
            animation: iconFloat 3s ease-in-out infinite;
        }

        @keyframes iconFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .empty-state h3 {
            font-size: 24px;
            color: #cbd5f5;
            margin-bottom: 10px;
            animation: titleFadeIn 1s ease-out 0.3s both;
        }

        .empty-state p {
            color: #94a3b8;
            margin-bottom: 30px;
            animation: textFadeIn 1s ease-out 0.5s both;
        }

        /* Loading Animation */
        body {
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        body.loaded {
            opacity: 1;
        }

        /* Additional Animation Classes */
        .animate-in {
            animation: fadeInScale 0.8s ease-out forwards;
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* ===== TOAST NOTIFICATION ===== */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            padding: 16px 24px;
            border-radius: 10px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            z-index: 1000;
            animation: slideInToast 0.4s ease-out;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        @keyframes slideInToast {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* ===== FOOTER ===== */
        footer {
            background: #050f28;
            padding: 30px;
            text-align: center;
            color: #94a3b8;
            margin-top: 40px;
        }

        @keyframes titleFadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes buttonClick {
            0% { transform: scale(1); }
            50% { transform: scale(0.95); }
            100% { transform: scale(1); }
        }

        @media (max-width: 768px) {
            .products-container {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 20px;
            }

            .page-header h1 {
                font-size: 32px;
            }

            main {
                padding: 20px;
            }

            .filters {
                gap: 10px;
            }

            .filter-btn {
                padding: 8px 16px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

<header>
    <h2>IPL Shop</h2>
    <nav>
        <a href="index.html">Home</a>
        <a href="teams.html">Teams</a>
        <a href="products.html" style="color: #facc15;">Shop</a>
        <button onclick="window.location.href='cart.html'" class="cart-icon-wrapper">
            🛒 Cart
            <span class="cart-badge" id="cartCount">0</span>
        </button>
    </nav>
</header>

<main>
    <div class="page-header">
        <h1>IPL Official Shop</h1>
        <p>Get your favorite team's jerseys and merchandise</p>
    </div>

    <div class="filters" id="filters">
        <button class="filter-btn active" onclick="filterByTeam('all')">All Teams</button>
        <button class="filter-btn" onclick="filterByTeam('CSK')">CSK</button>
        <button class="filter-btn" onclick="filterByTeam('MI')">MI</button>
        <button class="filter-btn" onclick="filterByTeam('RCB')">RCB</button>
        <button class="filter-btn" onclick="filterByTeam('KKR')">KKR</button>
        <button class="filter-btn" onclick="filterByTeam('GT')">GT</button>
        
    </div>

    <div class="products-container" id="productsContainer">
        <!-- Products will be loaded here -->
    </div>

    <div id="emptyState" class="empty-state" style="display: none;">
        <div class="empty-state-icon">🛍️</div>
        <h3>No Products Found</h3>
        <p>Try selecting a different filter</p>
    </div>
</main>

<footer>
    <p>&copy; 2026 IPL Shop. All Rights Reserved. | Unofficial Shop for IPL Merchandise</p>
</footer>

<script src="products.js"></script>

<script>
    // Initialize animations when DOM is loaded
    document.addEventListener('DOMContentLoaded', function() {
        // Create floating particles
        createParticles();

        // Initialize scroll animations
        initScrollAnimations();

        // Add interactive effects
        addInteractiveEffects();
    });

    // Create floating particles
    function createParticles() {
        const container = document.body;
        const particleCount = 40;

        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 15 + 's';
            particle.style.animationDuration = (Math.random() * 15 + 20) + 's';
            container.appendChild(particle);
        }
    }

    // Initialize scroll animations
    function initScrollAnimations() {
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -50px 0px'
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('animate-in');
                }
            });
        }, observerOptions);

        // Observe product cards
        document.querySelectorAll('.product-card').forEach(card => {
            observer.observe(card);
        });
    }

    // Add interactive effects
    function addInteractiveEffects() {
        // Enhanced product card hover effects
        document.querySelectorAll('.product-card').forEach(card => {
            card.addEventListener('mouseenter', function() {
                this.style.transform = 'translateY(-20px) scale(1.03) rotate(1deg)';
                this.style.boxShadow = '0 30px 70px rgba(250, 204, 21, 0.25)';
            });

            card.addEventListener('mouseleave', function() {
                this.style.transform = 'translateY(0) scale(1) rotate(0deg)';
                this.style.boxShadow = 'none';
            });
        });

        // Filter button click animations
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                // Remove active class from all buttons
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                // Add active class to clicked button
                this.classList.add('active');

                // Add click animation
                this.style.animation = 'buttonClick 0.3s ease';
                setTimeout(() => {
                    this.style.animation = '';
                }, 300);
            });
        });

        // Add to cart button effects
        document.querySelectorAll('.btn-add-cart').forEach(btn => {
            btn.addEventListener('click', function() {
                this.style.animation = 'buttonClick 0.2s ease';
                setTimeout(() => {
                    this.style.animation = '';
                }, 200);
            });
        });
    }

    // Add scroll-based parallax effect
    window.addEventListener('scroll', function() {
        const scrolled = window.pageYOffset;
        const rate = scrolled * -0.5;

        document.querySelectorAll('.particle').forEach(particle => {
            particle.style.transform = `translateY(${rate * 0.1}px)`;
        });
    });

    // Add loading animation
    window.addEventListener('load', function() {
        document.body.classList.add('loaded');
    });
</script>

</body>
</html>
